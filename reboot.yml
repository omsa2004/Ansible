- name: Reboot all machines one by one
  hosts: all
  become: yes
  gather_facts: no
  serial: 1
  order: sorted

  tasks:
    - name: Reboot host and wait until it comes back
      ansible.builtin.reboot:
        msg: "Reboot scheduled by Ansible/Semaphore"
        reboot_timeout: 900
        connect_timeout: 10
        post_reboot_delay: 15
      register: reboot_result

    - name: Mark reboot success
      ansible.builtin.set_fact:
        reboot_success: true

- name: Send summary notification
  hosts: localhost
  gather_facts: no
  vars:
    playbook_name: "reboot.yml"
  tasks:
    - name: Send Pushover notification
      ansible.builtin.uri:
        url: https://api.pushover.net/1/messages.json
        method: POST
        body:
          token: "{{ pover_token }}"
          user: "{{ pover_id }}"
          message: >-
            Playbook {{ playbook_name }} finished.
            Rebooted hosts:
            {{
              hostvars
              | dict2items
              | selectattr('value.reboot_success', 'defined')
              | selectattr('value.reboot_success')
              | map(attribute='key')
              | list
              | join(', ')
            }}
        body_format: form-urlencoded
      run_once: true
