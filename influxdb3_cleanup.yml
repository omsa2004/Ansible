- name: Clean up InfluxDB 3 snapshots
  hosts: graylog
  become: false
  tasks:
    - name: Delete old snapshots, keep 10 most recent
      ansible.builtin.shell: |
        cd /home/omar/.influxdb/data/node0/snapshots/
        count=$(ls -1 | wc -l)
        if [ "$count" -gt 10 ]; then
          ls -t | tail -n +11 | xargs rm -f
          echo "Deleted $((count - 10)) snapshots"
        else
          echo "Only $count snapshots, nothing to delete"
        fi
      register: cleanup_result

    - name: Show result
      ansible.builtin.debug:
        msg: "{{ cleanup_result.stdout }}"
