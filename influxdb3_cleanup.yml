- name: Clean up InfluxDB 3 snapshots
  hosts: graylog
  become: false
  tasks:
    - name: Get list of snapshot files sorted by date
      ansible.builtin.find:
        paths: "/home/omar/.influxdb/data/node0/snapshots"
        patterns: "*.json"
        age_stamp: mtime
      register: snapshot_files

    - name: Delete old snapshots (keep last 10)
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: >-
        {{
          snapshot_files.files
          | sort(attribute='mtime')
          | list
          | slice(0, [snapshot_files.files | length - 10, 0] | max)
          | sum(start=[])
        }}
      when: snapshot_files.files | length > 10

    - name: Show cleanup summary
      ansible.builtin.debug:
        msg: "Done. {{ snapshot_files.files | length }} snapshots found, kept 10 most recent"
