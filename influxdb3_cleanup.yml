# influxdb3_cleanup.yml
- name: Clean up InfluxDB 3 snapshots
  hosts: graylog
  become: false
  tasks:
    - name: Get list of snapshot files sorted by date
      ansible.builtin.find:
        paths: "/home/omar/.influxdb/data/node0/snapshots"
        patterns: "*.json"
        age_stamp: mtime
      register: snapshot_files

    - name: Sort and identify files to delete (keep last 10)
      ansible.builtin.set_fact:
        files_to_delete: >-
          {{
            snapshot_files.files
            | sort(attribute='mtime')
            | list
            | slice(0, (snapshot_files.files | length) - 10)
            | list
            | sum(start=[])
          }}

    - name: Delete old snapshots
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ files_to_delete }}"
      when: snapshot_files.files | length > 10

    - name: Show cleanup summary
      ansible.builtin.debug:
        msg: "Deleted {{ files_to_delete | length }} snapshots, kept 10 most recent"
